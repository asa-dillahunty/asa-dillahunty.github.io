version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      actions:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      web:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/functions"
    schedule:
      interval: "monthly"
    groups:
      functions:
        patterns:
          - "*"
